server:
  port: 8080

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  application:
    name: xiyiyun-backend
  datasource:
    url: jdbc:mysql://localhost:3306/xiyiyun?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: xiyiyun
    password: xiyiyun_pwd
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

xiyiyun:
  order:
    payment-timeout-minutes: 15
  delivery:
    auto-refund-on-card-empty: false
