services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set mysql root password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?set mysql database}
      MYSQL_USER: ${MYSQL_USER:?set mysql user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set mysql password}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
      args:
        MAVEN_MIRROR_URL: ${MAVEN_MIRROR_URL:-https://maven.aliyun.com/repository/public}
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:?set mysql database}?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:?set mysql user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:?set mysql password}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_PROFILES_ACTIVE: prod
      XIYIYUN_ADMIN_USERNAME: ${XIYIYUN_ADMIN_USERNAME:?set admin username}
      XIYIYUN_ADMIN_PASSWORD_BCRYPT: ${XIYIYUN_ADMIN_PASSWORD_BCRYPT:?set admin bcrypt password hash}
      XIYIYUN_ADMIN_NICKNAME: ${XIYIYUN_ADMIN_NICKNAME:-运营管理员}
      XIYIYUN_PAYMENT_CALLBACK_SECRET: ${XIYIYUN_PAYMENT_CALLBACK_SECRET:?set payment callback secret}
      XIYIYUN_CARD_ENCRYPTION_SECRET: ${XIYIYUN_CARD_ENCRYPTION_SECRET:?set card encryption secret}
      XIYIYUN_CORS_ALLOWED_ORIGINS: ${XIYIYUN_CORS_ALLOWED_ORIGINS:?set comma-separated CORS allowed origins}
      XIYIYUN_UPLOAD_DIR: /data/uploads
    volumes:
      - upload-data:/data/uploads
    depends_on:
      - mysql
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    ports:
      - "${XIYIYUN_HTTP_BIND:-127.0.0.1}:${WEB_PORT:-80}:80"
    depends_on:
      - backend

  h5:
    build:
      context: .
      dockerfile: apps/h5/Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    ports:
      - "${XIYIYUN_HTTP_BIND:-127.0.0.1}:${H5_PORT:-18080}:80"
    depends_on:
      - backend

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_ADMIN_API_BASE_URL: /api
    restart: unless-stopped
    ports:
      - "${XIYIYUN_HTTP_BIND:-127.0.0.1}:${ADMIN_PORT:-8088}:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  redis-data:
  upload-data:
