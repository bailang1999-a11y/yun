services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-xiyiyun_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xiyiyun}
      MYSQL_USER: ${MYSQL_USER:-xiyiyun}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-xiyiyun_pwd}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-xiyiyun}?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-xiyiyun}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-xiyiyun_pwd}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - mysql
      - redis

  h5:
    build:
      context: .
      dockerfile: apps/h5/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    ports:
      - "${H5_PORT:-80}:80"
    depends_on:
      - backend

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_ADMIN_API_BASE_URL: /api
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-8088}:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  redis-data:
