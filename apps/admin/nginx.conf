map $http_x_forwarded_proto $xiyiyun_forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

server {
  listen 80;
  server_name _;
  server_tokens off;
  client_max_body_size 12m;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss: https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; frame-src https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; worker-src 'self' blob: https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; child-src https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

  location /api/ {
    rewrite ^/api/api/(.*)$ /api/$1 break;
    proxy_pass http://backend:8080/api/;
    proxy_connect_timeout 10s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $xiyiyun_forwarded_proto;
  }

  location /ws/ {
    proxy_pass http://backend:8080/ws/;
    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 3600s;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $xiyiyun_forwarded_proto;
  }

  location /uploads/ {
    proxy_pass http://backend:8080/uploads/;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $xiyiyun_forwarded_proto;
    add_header Cache-Control "public, max-age=86400" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss: https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; frame-src https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; worker-src 'self' blob: https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; child-src https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss: https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; frame-src https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; worker-src 'self' blob: https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; child-src https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss: https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; frame-src https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; worker-src 'self' blob: https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; child-src https://turing.captcha.qcloud.com https://ca.turing.captcha.qcloud.com https://ssl.captcha.qq.com https://cloudcache.tencentcs.com https://turing.captcha.gtimg.com https://global.turing.captcha.gtimg.com https://rce.tencentrio.com https://challenges.cloudflare.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
